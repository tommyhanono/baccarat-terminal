<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baccarat Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0d0d0d;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #terminal {
      width: 100%;
      height: 100%;
    }
    .xterm { height: 100%; }
    .xterm-screen { height: 100% !important; }
    .xterm-viewport { overflow-y: hidden !important; }

    #mobile-warning {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 16px;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      z-index: 100;
    }
    #mobile-warning h2 { color: #e5c07b; margin-bottom: 16px; }
    #mobile-warning p  { color: #888; margin-top: 12px; line-height: 1.6; }
    @media (max-width: 700px) {
      #mobile-warning { display: flex; flex-direction: column; }
      #terminal { display: none; }
    }
  </style>
</head>
<body>

  <div id="mobile-warning">
    <h2>🎴 Baccarat Terminal</h2>
    <p>Este juego requiere un teclado y pantalla ancha para funcionar correctamente.</p>
    <p>Abrilo desde una computadora de escritorio o laptop.</p>
  </div>

  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="game.js"></script>
</body>
</html>
